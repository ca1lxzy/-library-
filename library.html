<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kutubxona — Library Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14201c;
    --panel: #1b2b25;
    --panel-line: #2a3d34;
    --card: #f2e9d8;
    --card-line: #d8cba8;
    --ink: #2b241a;
    --ink-soft: #6b5f4a;
    --brass: #c9a227;
    --brass-soft: rgba(201,162,39,0.16);
    --stamp: #b6432f;
    --available: #4f8a5b;
    --text: #e8e3d3;
    --text-muted: #93a39a;
    --serif: 'Libre Baskerville', serif;
    --sans: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background:
      radial-gradient(circle at 10% 0%, rgba(201,162,39,0.05), transparent 45%),
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height:100vh;
    padding: 32px 18px 60px;
  }

  .wrap{ max-width: 920px; margin: 0 auto; }

  header{ margin-bottom: 22px; }
  header h1{
    font-family: var(--serif);
    font-weight:700;
    font-size: 28px;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  header p{ color: var(--text-muted); font-size: 13px; margin-top:4px; font-family: var(--mono); }

  .toolbar{
    display:flex; flex-wrap:wrap; gap:10px;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
  }
  .toolbar input, .toolbar select{
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-line);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: var(--sans);
    font-size: 13.5px;
    outline:none;
  }
  .toolbar input::placeholder{ color: var(--text-muted); }
  .toolbar input:focus, .toolbar select:focus{ border-color: var(--brass); }
  #searchInput{ flex:1; min-width: 160px; }
  .toolbar select{ cursor:pointer; }

  .add-btn{
    background: var(--brass);
    color: #2b220a;
    border:none;
    border-radius: 8px;
    padding: 9px 16px;
    font-family: var(--sans);
    font-size: 13.5px;
    font-weight:600;
    cursor:pointer;
    transition: filter .15s ease;
  }
  .add-btn:hover{ filter: brightness(1.08); }

  /* Add-book form */
  .form-panel{
    display:none;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .form-panel.show{ display:flex; }
  .form-panel input{
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-line);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13.5px;
    outline:none;
    flex:1;
    min-width: 140px;
  }
  .form-panel input:focus{ border-color: var(--brass); }
  .form-panel button{
    background: var(--available);
    color: #0c1f10;
    border:none;
    border-radius: 8px;
    padding: 9px 18px;
    font-weight:600;
    font-size: 13.5px;
    cursor:pointer;
  }

  .count-row{ color: var(--text-muted); font-size: 12.5px; margin-bottom: 12px; font-family: var(--mono); }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 16px;
  }

  .card{
    position:relative;
    background: var(--card);
    color: var(--ink);
    border-radius: 3px;
    padding: 16px 16px 14px;
    box-shadow: 0 10px 22px -12px rgba(0,0,0,0.5);
    border-left: 4px solid var(--brass);
    overflow:hidden;
    transition: transform .15s ease;
  }
  .card:hover{ transform: translateY(-3px); }
  .card::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height: 22px;
    background: repeating-linear-gradient(to right, transparent 0 24px, var(--card-line) 24px 25px);
    opacity:.5;
  }

  .call-no{ font-family: var(--mono); font-size: 10.5px; color: var(--ink-soft); }
  .title{ font-family: var(--serif); font-weight:700; font-size: 16.5px; margin: 6px 0 2px; line-height:1.3; }
  .author{ font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--ink-soft); margin-bottom:10px; }

  .tag-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px; }
  .genre-tag{
    font-family: var(--mono); font-size: 10.5px;
    background: var(--brass-soft);
    border: 1px solid rgba(201,162,39,0.4);
    color: #8a6d13;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .status{
    font-family: var(--mono); font-size: 10.5px;
    font-weight:600;
  }
  .status.available{ color: var(--available); }
  .status.borrowed{ color: var(--stamp); }

  .card-actions{ display:flex; gap:8px; }
  .card-actions button{
    flex:1;
    border:none;
    border-radius: 6px;
    padding: 8px 6px;
    font-size: 12px;
    font-family: var(--sans);
    font-weight:600;
    cursor:pointer;
  }
  .borrow-btn{ background: var(--ink); color: var(--card); }
  .borrow-btn.return-mode{ background: var(--available); color: #0c1f10; }
  .del-btn{ background: transparent; color: var(--stamp); border: 1px solid rgba(182,67,47,0.4) !important; flex: 0 0 34px; }

  .stamp{
    position:absolute;
    top: 44px; right: 8px;
    font-family: var(--mono);
    font-weight:700;
    font-size: 12px;
    color: var(--stamp);
    border: 2px solid var(--stamp);
    padding: 3px 8px;
    border-radius: 4px;
    transform: rotate(-14deg);
    opacity: 0.85;
    letter-spacing: 0.05em;
    pointer-events:none;
  }

  .empty{
    grid-column: 1 / -1;
    text-align:center;
    color: var(--text-muted);
    padding: 40px 10px;
    font-size: 14px;
  }

  @media (max-width: 480px){
    .toolbar{ flex-direction:column; }
    #searchInput{ min-width: unset; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>📚 Kutubxona</h1>
    <p id="subtitle">Kitoblar katalogi va ijara boshqaruvi</p>
  </header>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Kitob yoki muallif bo'yicha qidirish...">
    <select id="genreFilter">
      <option value="all">Barcha janrlar</option>
    </select>
    <select id="statusFilter">
      <option value="all">Barcha holat</option>
      <option value="available">Mavjud</option>
      <option value="borrowed">Ijarada</option>
    </select>
    <button class="add-btn" id="toggleForm">+ Kitob qo'shish</button>
  </div>

  <div class="form-panel" id="formPanel">
    <input type="text" id="newTitle" placeholder="Kitob nomi">
    <input type="text" id="newAuthor" placeholder="Muallif">
    <input type="text" id="newGenre" placeholder="Janr (masalan: Roman)">
    <button id="submitBook">Qo'shish</button>
  </div>

  <div class="count-row" id="countRow">0 ta kitob</div>

  <div class="grid" id="grid"></div>
</div>

<script>
  // ===== Boshlang'ich ma'lumotlar (agar localStorage bo'sh bo'lsa) =====
  const seedBooks = [
    { id: 1, title: "O'tkan kunlar", author: "Abdulla Qodiriy", genre: "Roman", borrowed: false, callNo: "LIB-001" },
    { id: 2, title: "Sariq devni minib", author: "Xudoyberdi To'xtaboyev", genre: "Sarguzasht", borrowed: true, callNo: "LIB-002" },
    { id: 3, title: "Mehrobdan chayon", author: "Abdulla Qodiriy", genre: "Roman", borrowed: false, callNo: "LIB-003" },
    { id: 4, title: "Kecha va kunduz", author: "Cho'lpon", genre: "Roman", borrowed: false, callNo: "LIB-004" },
  ];

  let books = JSON.parse(localStorage.getItem('library-books') || 'null') || seedBooks;
  let nextId = Math.max(0, ...books.map(b => b.id)) + 1;

  const grid = document.getElementById('grid');
  const countRow = document.getElementById('countRow');
  const searchInput = document.getElementById('searchInput');
  const genreFilter = document.getElementById('genreFilter');
  const statusFilter = document.getElementById('statusFilter');
  const toggleForm = document.getElementById('toggleForm');
  const formPanel = document.getElementById('formPanel');
  const submitBook = document.getElementById('submitBook');

  function save(){ localStorage.setItem('library-books', JSON.stringify(books)); }

  function refreshGenreOptions(){
    const genres = [...new Set(books.map(b => b.genre))].sort();
    const current = genreFilter.value;
    genreFilter.innerHTML = '<option value="all">Barcha janrlar</option>' +
      genres.map(g => `<option value="${escapeAttr(g)}">${escapeHtml(g)}</option>`).join('');
    genreFilter.value = genres.includes(current) ? current : 'all';
  }

  function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
  function escapeAttr(str){ return escapeHtml(str).replace(/"/g,'&quot;'); }

  function getFiltered(){
    const q = searchInput.value.trim().toLowerCase();
    const g = genreFilter.value;
    const s = statusFilter.value;
    return books.filter(b => {
      const matchesQuery = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
      const matchesGenre = g === 'all' || b.genre === g;
      const matchesStatus = s === 'all' || (s === 'available' && !b.borrowed) || (s === 'borrowed' && b.borrowed);
      return matchesQuery && matchesGenre && matchesStatus;
    });
  }

  function render(){
    refreshGenreOptions();
    const filtered = getFiltered();
    countRow.textContent = `${filtered.length} ta kitob (jami ${books.length})`;

    grid.innerHTML = '';
    if (filtered.length === 0){
      grid.innerHTML = '<div class="empty">Hech qanday kitob topilmadi.</div>';
      return;
    }

    filtered.forEach(b => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        ${b.borrowed ? '<div class="stamp">IJARADA</div>' : ''}
        <div class="call-no">${b.callNo}</div>
        <div class="title">${escapeHtml(b.title)}</div>
        <div class="author">${escapeHtml(b.author)}</div>
        <div class="tag-row">
          <span class="genre-tag">${escapeHtml(b.genre)}</span>
          <span class="status ${b.borrowed ? 'borrowed' : 'available'}">${b.borrowed ? 'Ijarada' : 'Mavjud'}</span>
        </div>
        <div class="card-actions">
          <button class="borrow-btn ${b.borrowed ? 'return-mode' : ''}" data-id="${b.id}" data-action="toggle">
            ${b.borrowed ? "Qaytarish" : "Ijaraga berish"}
          </button>
          <button class="del-btn" data-id="${b.id}" data-action="delete">✕</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  grid.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const id = Number(btn.dataset.id);
    const book = books.find(b => b.id === id);
    if (!book) return;

    if (btn.dataset.action === 'toggle'){
      book.borrowed = !book.borrowed;
    } else if (btn.dataset.action === 'delete'){
      if (confirm(`"${book.title}" kitobini o'chirishni tasdiqlaysizmi?`)){
        books = books.filter(b => b.id !== id);
      }
    }
    save();
    render();
  });

  toggleForm.addEventListener('click', () => formPanel.classList.toggle('show'));

  submitBook.addEventListener('click', () => {
    const title = document.getElementById('newTitle').value.trim();
    const author = document.getElementById('newAuthor').value.trim();
    const genre = document.getElementById('newGenre').value.trim() || 'Boshqa';
    if (!title || !author) return;

    books.push({ id: nextId++, title, author, genre, borrowed: false, callNo: 'LIB-' + String(nextId - 1).padStart(3, '0') });
    save();
    document.getElementById('newTitle').value = '';
    document.getElementById('newAuthor').value = '';
    document.getElementById('newGenre').value = '';
    formPanel.classList.remove('show');
    render();
  });

  [searchInput, genreFilter, statusFilter].forEach(el => el.addEventListener('input', render));

  render();
</script>

</body>
</html>
